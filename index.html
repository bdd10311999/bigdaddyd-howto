<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How bigdaddyd.net Works</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #E8A020;
    --gold-dark: #B87A10;
    --gold-light: #F5C84A;
    --bg: #0E0E0E;
    --bg2: #161616;
    --bg3: #1E1E1E;
    --surface: #242424;
    --border: rgba(255,255,255,0.08);
    --text: #F0EDE6;
    --text-muted: #888880;
    --teal: #2ABFAA;
    --coral: #E8593C;
    --amber: #E8A020;
    --purple: #8B6FD4;
    --blue: #3B8BD4;
    --gray: #888880;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    padding: 40px 48px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 24px;
    background: var(--bg2);
  }

  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 0.04em;
    color: var(--gold);
    line-height: 1;
  }

  .header-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding-bottom: 6px;
  }

  /* ── LAYOUT ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 380px;
    height: calc(100vh - 113px);
  }

  /* ── DIAGRAM PANEL ── */
  .diagram-panel {
    padding: 40px;
    overflow: auto;
    position: relative;
  }

  .diagram-intro {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }

  .diagram-intro span {
    color: var(--gold);
  }

  svg.diagram {
    width: 100%;
    max-width: 680px;
    display: block;
  }

  /* SVG node styles */
  .node-box {
    cursor: pointer;
    transition: filter 0.15s;
  }
  .node-box:hover rect { filter: brightness(1.2); }
  .node-box.active rect { stroke-width: 2.5 !important; }

  .node-box rect {
    transition: filter 0.15s;
  }

  /* ── INFO PANEL ── */
  .info-panel {
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .info-default {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 40px;
    text-align: center;
    gap: 16px;
    color: var(--text-muted);
  }

  .info-default .arrow-hint {
    font-size: 40px;
    opacity: 0.3;
  }

  .info-default p {
    font-size: 14px;
    line-height: 1.7;
    max-width: 240px;
  }

  .info-content {
    display: none;
    flex-direction: column;
    height: 100%;
    overflow-y: auto;
  }

  .info-content.visible {
    display: flex;
  }

  .info-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg2);
    z-index: 1;
  }

  .info-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .info-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--gold);
  }

  .info-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 6px;
    line-height: 1.5;
  }

  .info-body {
    padding: 24px 28px;
    flex: 1;
  }

  .info-section {
    margin-bottom: 28px;
  }

  .info-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .info-section p {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 10px;
  }

  .step-list {
    list-style: none;
    counter-reset: steps;
  }

  .step-list li {
    counter-increment: steps;
    display: flex;
    gap: 12px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 10px;
    align-items: flex-start;
  }

  .step-list li::before {
    content: counter(steps);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--bg);
    background: var(--gold);
    min-width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .tip-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-muted);
    margin-top: 8px;
  }

  .tip-box strong {
    color: var(--gold);
    font-weight: 500;
    display: block;
    margin-bottom: 4px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .warn-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-left: 3px solid var(--coral);
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-muted);
    margin-top: 8px;
  }

  .warn-box strong {
    color: var(--coral);
    font-weight: 500;
    display: block;
    margin-bottom: 4px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .url-pill {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    color: var(--teal);
    margin: 2px 0;
  }

  .close-btn {
    display: block;
    margin: 0 28px 24px;
    padding: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, color 0.15s;
  }

  .close-btn:hover {
    background: var(--bg3);
    color: var(--text);
  }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .legend-line {
    width: 28px;
    height: 2px;
    background: var(--text-muted);
  }

  .legend-dashed {
    background: repeating-linear-gradient(90deg, var(--text-muted) 0, var(--text-muted) 4px, transparent 4px, transparent 8px);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; }
    .info-panel { border-left: none; border-top: 1px solid var(--border); min-height: 400px; }
    header { padding: 24px; flex-direction: column; align-items: flex-start; gap: 8px; }
    .diagram-panel { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-logo">Big Daddy D &amp; The Dynamites</div>
  <div class="header-sub">How bigdaddyd.net works — click any component to learn more</div>
</header>

<div class="main">

  <!-- ── DIAGRAM ── -->
  <div class="diagram-panel">
    <div class="diagram-intro">

      <!-- Pi → GitHub -->

      <text x="340" y="48" text-anchor="middle" font-family="'DM Mono',monospace" font-size="10" fill="#555">pushes</text>

      <!-- GitHub → Cloudflare -->
      <line x1="425" y1="82" x2="425" y2="130" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="440" y="110" text-anchor="start" font-family="'DM Mono',monospace" font-size="10" fill="#555">auto-deploy</text>

      <!-- ── CENTER: WEBSITE ── -->
      <g class="node-box" id="node-website" onclick="showInfo('website')">

      <g class="node-box" id="node-calendar" onclick="showInfo('calendar')">

        <text x="485" y="202" text-anchor="middle" font-family="'DM Mono',monospace" font-size="12" font-weight="500" fill="#3B8BD4">Printful</text>

      <button class="close-btn" onclick="closeInfo()">← Back to diagram</button>

function showInfo(id) {
  const d = data[id];
  if (!d) return;

  document.getElementById('info-default').style.display = 'none';
  document.getElementById('info-content').classList.add('visible');

  document.getElementById('info-tag').textContent = d.tag;
  document.getElementById('info-title').textContent = d.title;
  document.getElementById('info-subtitle').textContent = d.subtitle;

  const stepsHTML = d.steps.map(s => `<li>${s}</li>`).join('');
  const tipHTML = d.tip ? `<div class="${d.tip.type === 'warn' ? 'warn-box' : 'tip-box'}"><strong>${d.tip.label}</strong>${d.tip.text}</div>` : '';

  document.getElementById('info-body').innerHTML = `
    <div class="info-section">
      <div class="info-section-label">What it is</div>
      ${d.what}
    </div>
    <div class="info-section">
      <div class="info-section-label">How to manage it</div>
      <ol class="step-list">${stepsHTML}</ol>
      ${tipHTML}
    </div>
  `;

  document.querySelectorAll('.node-box').forEach(n => n.classList.remove('active'));
  const activeNode = document.getElementById('node-' + id);
  if (activeNode) activeNode.classList.add('active');

  document.getElementById('info-content').scrollTop = 0;
}

function closeInfo() {
  document.getElementById('info-default').style.display = 'flex';
  document.getElementById('info-content').classList.remove('visible');
  document.querySelectorAll('.node-box').forEach(n => n.classList.remove('active'));
}
</script>
